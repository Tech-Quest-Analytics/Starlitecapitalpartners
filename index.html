<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    
    <!-- Favicon -->
    <link rel="icon" href="https://f4106b695ee260aafd87fdcf0205d09d.cdn.bubble.io/f1765658953444x631435179987697400/Starlite%20Capital%20Partners%20%289%29.png" type="image/png">
    <link rel="apple-touch-icon" href="https://f4106b695ee260aafd87fdcf0205d09d.cdn.bubble.io/f1765658953444x631435179987697400/Starlite%20Capital%20Partners%20%289%29.png">
    <link rel="shortcut icon" href="https://f4106b695ee260aafd87fdcf0205d09d.cdn.bubble.io/f1765658953444x631435179987697400/Starlite%20Capital%20Partners%20%289%29.png">

    <title>Starlite Capital Partners</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        html{scroll-behavior:smooth;}
        body{background:#fff;color:#1a2138;font-family:'Inter',sans-serif;overflow-x:hidden;}
        
        /* MARKET TICKER */
        :root{ --ticker-h: 38px; }
        .ticker{
          position:fixed;top:0;left:0;width:100%;z-index:1000;
          height:var(--ticker-h);
          background:#1a2138;
          overflow:hidden;
          display:flex;align-items:center;
          border-bottom:1px solid rgba(255,255,255,0.06);
        }
        .ticker-label{
          flex:none;
          display:flex;align-items:center;gap:6px;
          height:100%;
          padding:0 16px;
          background:linear-gradient(90deg,#0f1428,#1a2138);
          color:#eef1ff;
          font-size:10px;letter-spacing:2px;text-transform:uppercase;
          z-index:2;
          box-shadow:14px 0 18px -10px #1a2138;
        }
        .ticker-dot{
          width:6px;height:6px;border-radius:50%;
          background:#5ee6a0;
          box-shadow:0 0 0 0 rgba(94,230,160,0.6);
          animation:ticker-pulse 1.8s ease-out infinite;
        }
        .ticker-status{
          color:#6b7aaa;
          font-size:9px;letter-spacing:1px;
          text-transform:none;
          margin-left:6px;
        }
        @keyframes ticker-pulse{
          0%{box-shadow:0 0 0 0 rgba(94,230,160,0.55);}
          70%{box-shadow:0 0 0 6px rgba(94,230,160,0);}
          100%{box-shadow:0 0 0 0 rgba(94,230,160,0);}
        }
        .ticker-track-wrap{
          flex:1;overflow:hidden;height:100%;position:relative;
        }
        .ticker-track{
          display:flex;align-items:center;
          width:max-content;
          animation:ticker-scroll 90s linear infinite;
        }
        .ticker-track:hover{ animation-play-state:paused; }
        @keyframes ticker-scroll{
          from{ transform:translateX(0); }
          to{ transform:translateX(-50%); }
        }
        .ticker-item{
          display:flex;align-items:center;gap:8px;
          padding:0 22px;
          font-size:12px;font-weight:500;
          color:#eef1ff;
          white-space:nowrap;
          border-right:1px solid rgba(255,255,255,0.08);
        }
        .ticker-sym{ color:#9aa3be;font-weight:400;letter-spacing:0.5px;}
        .ticker-price{ font-variant-numeric:tabular-nums; }
        .ticker-chg{
          font-variant-numeric:tabular-nums;
          display:flex;align-items:center;gap:3px;
          transition:color 0.3s ease;
        }
        .ticker-chg.up{ color:#5ee6a0; }
        .ticker-chg.down{ color:#ff7a8a; }
        .ticker-chg .arrow{ font-size:9px; }

        /* NAV */
        .nav{
          position:fixed;top:var(--ticker-h);left:0;width:100%;z-index:999;
          background:rgba(255,255,255,0.92);
          backdrop-filter:blur(16px);
          border-bottom:1px solid rgba(0,0,0,0.06);
        }
        .nav-inner{
          max-width:1400px;margin:auto;
          padding:20px 40px;
          display:flex;justify-content:space-between;align-items:center;
          gap:24px;
        }
        .brand{display:flex;flex-direction:column;align-items:flex-start;line-height:1;text-align:left;}
        .brand-link{text-decoration:none;display:flex;flex-direction:column;align-items:flex-start;}
        .brand-main{
          font-family:'Playfair Display',serif;
          font-size:24px;letter-spacing:-0.5px;color:#1a2138;
        }
        .brand-sub{font-size:9px;letter-spacing:4px;color:#6b7aaa;margin-top:4px;text-transform:uppercase;}
        .nav-links{
          display:flex;align-items:center;gap:36px;
          list-style:none;
        }
        .nav-links > li{position:relative;}
        .nav-link{
          text-decoration:none;color:#1a2138;
          font-size:13px;letter-spacing:0.5px;
          font-weight:400;
          padding:8px 0;
          display:flex;align-items:center;gap:6px;
          transition:color 0.2s ease;
          cursor:pointer;
          background:none;border:none;font-family:'Inter',sans-serif;
        }
        .nav-link:hover{color:#4a7bff;}
        .nav-caret{
          width:8px;height:8px;
          border-right:1.5px solid currentColor;
          border-bottom:1.5px solid currentColor;
          transform:rotate(45deg);
          transition:transform 0.2s ease;
          margin-top:-3px;
        }
        .has-dropdown.open .nav-caret{ transform:rotate(225deg);margin-top:3px; }
        .dropdown{
          position:absolute;top:100%;left:50%;
          transform:translate(-50%,8px);
          min-width:220px;
          background:#fff;
          border:1px solid rgba(0,0,0,0.07);
          border-radius:14px;
          box-shadow:0 18px 40px rgba(26,33,56,0.12);
          padding:10px;
          opacity:0;visibility:hidden;
          transition:opacity 0.18s ease, transform 0.18s ease, visibility 0.18s;
          z-index:1001;
        }
        .has-dropdown.open .dropdown,
        .has-dropdown:hover .dropdown{
          opacity:1;visibility:visible;
          transform:translate(-50%,0);
        }
        .dropdown a{
          display:block;
          text-decoration:none;
          color:#1a2138;
          font-size:13px;
          padding:11px 14px;
          border-radius:9px;
          transition:background 0.15s ease,color 0.15s ease;
        }
        .dropdown a:hover{background:rgba(74,123,255,0.08);color:#4a7bff;}
        
        .nav-toggle{
          display:none;
          flex-direction:column;gap:5px;
          background:none;border:none;cursor:pointer;padding:6px;
        }
        .nav-toggle span{width:22px;height:1.5px;background:#1a2138;display:block;}

        /* HERO - Improved Mobile */
        .hero{
          position:relative;
          min-height:100vh;
          display:flex;align-items:center;justify-content:center;
          text-align:center;
          padding:calc(140px + var(--ticker-h)) 20px 80px;
          overflow:hidden;
          isolation:isolate;
        }
        .hero-video{
          position:absolute;
          top:0;left:0;
          width:100%;height:100%;
          object-fit:cover;
          z-index:-2;
        }
        .hero-overlay{
          position:absolute;
          top:0;left:0;
          width:100%;height:100%;
          z-index:-1;
          background: linear-gradient(180deg, rgba(255,255,255,0.5), rgba(255,255,255,0.62));
        }
        .hero-content{
          max-width:900px;
          width:100%;
          padding:32px 24px;
          border-radius:28px;
          background:rgba(255,255,255,0.6);
          backdrop-filter:blur(14px);
          box-shadow:0 20px 60px rgba(26,33,56,0.08);
        }
        .hero-logo-stage{
          position:relative;
          margin-bottom:16px;
        }
        .hero-logo{
          font-family:'Playfair Display',serif;
          font-size:clamp(52px, 11vw, 92px);
          line-height:0.85;
          letter-spacing:-3px;
          background:linear-gradient(90deg,#1a2138,#4a7bff);
          -webkit-background-clip:text;
          -webkit-text-fill-color:transparent;
        }
        .star{
          position:absolute;
          background:radial-gradient(circle,#ffffff 0%,#bcd2ff 45%,rgba(188,210,255,0) 75%);
          clip-path:polygon(50% 0%,61% 39%,100% 50%,61% 61%,50% 100%,39% 61%,0% 50%,39% 39%);
          opacity:0;
          animation:twinkle ease-in-out infinite;
          pointer-events:none;
        }
        @keyframes twinkle{
          0%,100%{opacity:0;transform:scale(0.3) rotate(0deg);}
          50%{opacity:1;transform:scale(1) rotate(20deg);}
        }

        .hero-sub{
          font-size:10px;
          letter-spacing:5px;
          text-transform:uppercase;
          color:#9aa3be;
          margin-bottom:32px;
        }
        .hero p{
          font-size:16px;
          line-height:1.8;
          color:#6b7aaa;
          max-width:100%;
          margin:0 auto 40px;
        }
        .hero-buttons{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;}
        .btn{
          padding:14px 30px;
          border-radius:999px;
          text-decoration:none;
          font-size:13px;
          letter-spacing:0.5px;
          transition:0.25s ease;
        }
        .btn-primary{background:#1a2138;color:#fff;}
        .btn-primary:hover{background:#2d3a5c;}

        /* Other sections */
        .divider{width:100%;border:none;border-top:1px solid rgba(0,0,0,0.07);}
        .stats{padding:80px 20px;display:flex;justify-content:center;gap:60px;flex-wrap:wrap;}
        .stat h3{font-family:'Playfair Display',serif;font-size:42px;font-weight:400;color:#1a2138;margin-bottom:8px;}
        .stat p{font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:#9aa3be;}
        
        footer{padding:80px 20px 40px;border-top:1px solid rgba(0,0,0,0.07);}
        .footer-inner{max-width:1350px;margin:auto;}
        .footer-top{display:flex;justify-content:space-between;gap:40px;flex-wrap:wrap;margin-bottom:50px;}
        .footer-brand h3{font-family:'Playfair Display',serif;font-size:32px;color:#1a2138;margin-bottom:12px;}
        .footer-brand p{color:#6b7aaa;font-size:14px;line-height:1.8;max-width:420px;}
        .footer-links{display:flex;flex-wrap:wrap;gap:12px 28px;}
        .footer-links a{text-decoration:none;color:#6b7aaa;font-size:13px;}
        .footer-links a:hover{color:#1a2138;}
        .footer-bottom{border-top:1px solid rgba(0,0,0,0.07);padding-top:25px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;font-size:13px;color:#9aa3be;}

        /* PRIVACY BANNER */
        .privacy-banner{
          position:fixed;bottom:16px;left:16px;right:16px;
          background:#fff;border:1px solid rgba(0,0,0,0.1);
          border-radius:16px;padding:18px 22px;
          display:flex;justify-content:space-between;align-items:center;
          gap:16px;z-index:5000;
          box-shadow:0 8px 40px rgba(0,0,0,0.08);
        }
        @media(max-width:768px){
          .privacy-banner{flex-direction:column;align-items:flex-start;}
        }
    </style>
</head>
<body>
