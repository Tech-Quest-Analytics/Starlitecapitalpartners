<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Starlite Capital Partners</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* Your existing styles (kept the same) */
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:#fff;color:#1a2138;}
        .stats{padding:90px 40px;display:flex;justify-content:center;gap:120px;flex-wrap:wrap;}
        .stat h3{font-family:'Playfair Display',serif;font-size:52px;font-weight:400;color:#1a2138;margin-bottom:8px;letter-spacing:-2px;}
        .stat p{font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:#9aa3be;}
        /* ... rest of your styles ... */
    </style>
</head>
<body>
    <!-- Your ticker, nav, hero, footer remain the same -->

    <div class="stats" id="statsSection">
      <div class="stat">
        <h3 class="stat-number" data-target="50" data-prefix="$" data-suffix="B+">$0B+</h3>
        <p>Assets Under Management</p>
      </div>
      <div class="stat">
        <h3 class="stat-number" data-target="150" data-suffix="+">0+</h3>
        <p>Private Equity Portfolio Companies</p>
      </div>
      <div class="stat">
        <h3 class="stat-number" data-target="7" data-suffix="">0</h3>
        <p>World-Class Strategies</p>
      </div>
    </div>

    <script>
      // === COUNTER ANIMATION ===
      function animateValue(id) {
        const el = document.querySelector(id);
        if (!el) return;
        
        const target = parseFloat(el.getAttribute('data-target'));
        const prefix = el.getAttribute('data-prefix') || '';
        const suffix = el.getAttribute('data-suffix') || '';
        const duration = 2200;
        const start = 0;
        const startTime = performance.now();

        function update(currentTime) {
          const elapsed = currentTime - startTime;
          let progress = Math.min(elapsed / duration, 1);
          progress = 1 - Math.pow(1 - progress, 3); // smooth easing

          const value = Math.floor(start + (target - start) * progress);
          el.textContent = prefix + value + suffix;

          if (progress < 1) {
            requestAnimationFrame(update);
          } else {
            el.textContent = prefix + target + suffix;
          }
        }
        requestAnimationFrame(update);
      }

      // Run counters when stats section is visible
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            document.querySelectorAll('.stat-number').forEach((num, index) => {
              setTimeout(() => animateValue(`.stat-number:nth-child(${index+1})`), index * 200);
            });
            observer.disconnect();
          }
        });
      }, { threshold: 0.6 });

      observer.observe(document.getElementById('statsSection'));

      // Privacy banner (already working)
      const banner = document.getElementById('privacyBanner');
      if (localStorage.getItem('starlitePrivacyAccepted')) banner.style.display = 'none';
      document.getElementById('acceptPrivacy').addEventListener('click', () => {
        localStorage.setItem('starlitePrivacyAccepted', 'true');
        banner.style.display = 'none';
      });
    </script>
</body>
</html>
