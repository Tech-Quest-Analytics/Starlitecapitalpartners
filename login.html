<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    
    <!-- Favicon -->
    <link rel="icon" href="https://f4106b695ee260aafd87fdcf0205d09d.cdn.bubble.io/f1765658953444x631435179987697400/Starlite%20Capital%20Partners%20%289%29.png" type="image/png">
    <link rel="apple-touch-icon" href="https://f4106b695ee260aafd87fdcf0205d09d.cdn.bubble.io/f1765658953444x631435179987697400/Starlite%20Capital%20Partners%20%289%29.png">
    
    <title>Starlite Capital Partners — Investor Login</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { min-height: 100vh; background: #ffffff; color: #1a2138; font-family: 'Inter', system-ui, sans-serif; }
        body { display: flex; flex-direction: column; }

        /* Ticker */
        .ticker { position:fixed; top:0; left:0; width:100%; z-index:1000; height:38px; background:#1a2138; overflow:hidden; display:flex; align-items:center; border-bottom:1px solid rgba(255,255,255,0.06); }
        .ticker-label { flex:none; padding:0 16px; background:linear-gradient(90deg,#0f1428,#1a2138); color:#eef1ff; font-size:10px; letter-spacing:2px; text-transform:uppercase; }
        .ticker-dot { width:6px; height:6px; border-radius:50%; background:#5ee6a0; animation:ticker-pulse 1.8s infinite; }
        @keyframes ticker-pulse { 0% { box-shadow:0 0 0 0 rgba(94,230,160,0.6); } 70% { box-shadow:0 0 0 6px rgba(94,230,160,0); } 100% { box-shadow:0 0 0 0 rgba(94,230,160,0); } }

        /* Nav, Hero, Login Card styles (kept clean) */
        .hero { position:relative; min-height:100vh; padding:180px 20px 100px; text-align:center; display:flex; align-items:center; justify-content:center; }
        .hero-overlay { position:absolute; inset:0; background:linear-gradient(180deg, rgba(255,255,255,0.9), rgba(255,255,255,0.95)); z-index:-1; }
        .login-card { width:100%; max-width:440px; padding:42px 28px; background:rgba(246,248,252,0.98); border:1px solid rgba(70,100,200,0.15); border-radius:24px; box-shadow:0 25px 80px rgba(26,33,56,0.12); margin:auto; }
        .logo { font-family:'Playfair Display',serif; font-size:52px; letter-spacing:-1.5px; background:linear-gradient(90deg,#1a2138,#4a7bff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .input-wrap { margin-bottom:18px; text-align:left; }
        .input-wrap input { width:100%; padding:16px 20px; border:1px solid rgba(70,100,200,0.25); border-radius:14px; font-size:16px; }
        .submit-btn { width:100%; padding:17px; background:linear-gradient(90deg,#4a7bff,#7b9eff); color:white; border:none; border-radius:50px; font-size:17px; font-weight:500; cursor:pointer; }
        .privacy-banner { position:fixed; bottom:0; left:0; right:0; background:#1a2138; color:#eef1ff; padding:14px 20px; display:flex; align-items:center; justify-content:space-between; font-size:13px; z-index:9999; }
        .privacy-banner button { background:#5ee6a0; color:#1a2138; border:none; padding:8px 20px; border-radius:999px; font-weight:600; cursor:pointer; }

        @media (max-width: 768px) {
            .hero { padding-top:160px; }
            .login-card { padding:32px 20px; }
        }
    </style>
</head>
<body>

<!-- Ticker -->
<div class="ticker">
  <div class="ticker-label">
    <span class="ticker-dot"></span>
    LIVE MARKET STATUS
  </div>
  <div class="ticker-track-wrap">
    <div class="ticker-track"> <!-- Add your ticker items here --> </div>
  </div>
</div>

<!-- Hero + Login -->
<div class="hero">
  <div class="hero-overlay"></div>
  
  <div class="login-card">
    <div class="logo">Starlite</div>
    <div style="font-size:11px; letter-spacing:4px; color:#4a7bff; margin-bottom:24px;">CAPITAL PARTNERS</div>
    
    <h1>Investor Login</h1>
    <p class="subtitle">Secure access for verified partners</p>
    
    <!-- Your form goes here -->
    <form>
      <div class="input-wrap">
        <label>Email Address</label>
        <input type="email" placeholder="name@starlitecp.com" required>
      </div>
      <div class="input-wrap">
        <label>Password</label>
        <input type="password" placeholder="••••••••" required>
      </div>
      
      <button type="submit" class="submit-btn">Sign In</button>
    </form>
  </div>
</div>

<!-- Privacy Banner -->
<div class="privacy-banner" id="privacyBanner">
  <div>We use cookies and analytics to improve platform performance.</div>
  <div>
    <a href="https://tech-quest-analytics.github.io/Starlitecapitalpartners/privacy" style="color:#5ee6a0; margin-right:20px;">Privacy Policy</a>
    <button id="acceptPrivacy">Accept</button>
  </div>
</div>

<script>
  // Privacy banner
  const banner = document.getElementById('privacyBanner');
  const acceptBtn = document.getElementById('acceptPrivacy');
  
  if (localStorage.getItem('privacyAccepted')) {
    banner.style.display = 'none';
  }
  
  acceptBtn.addEventListener('click', () => {
    banner.style.display = 'none';
    localStorage.setItem('privacyAccepted', 'true');
  });
</script>

</body>
</html>
